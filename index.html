<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Focus.</h1>
            <button id="btn-settings" class="icon-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2-2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <main class="timer-card">
            <div class="mode-selector">
                <button class="mode-btn active" id="btn-pomodoro">Pomodoro</button>
                <button class="mode-btn" id="btn-short-break">Short Break</button>
                <button class="mode-btn" id="btn-long-break">Long Break</button>
            </div>

            <div class="timer-icon-container">
                <img src="timer-icon.png" alt="Pomodoro Timer" class="timer-icon" />
            </div>

            <div class="timer-display">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>

            <div class="controls">
                <button id="btn-start" class="control-btn primary">Start</button>
                <button id="btn-reset" class="control-btn secondary">Reset</button>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="btn-close-settings" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="theme-toggle">Dark Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                
                <div class="settings-divider"></div>
                <h3>Timer Durations (minutes)</h3>
                
                <div class="setting-group">
                    <label for="input-pomodoro">Pomodoro</label>
                    <input type="number" id="input-pomodoro" min="1" max="90" value="25">
                </div>
                <div class="setting-group">
                    <label for="input-short-break">Short Break</label>
                    <input type="number" id="input-short-break" min="1" max="30" value="5">
                </div>
                <div class="setting-group">
                    <label for="input-long-break">Long Break</label>
                    <input type="number" id="input-long-break" min="1" max="60" value="15">
                </div>
                
                <button id="btn-save-settings" class="control-btn primary">Save Changes</button>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
